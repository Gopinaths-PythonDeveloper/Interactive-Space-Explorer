<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Interactive Space Explorer</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- SPACE -->

    <div class="space">

        <!-- STARS -->

        <div class="stars"></div>

        <!-- TITLE -->

        <div class="title">

            INTERACTIVE SPACE EXPLORER

        </div>

        <!-- INFO BOX -->

        <div class="info-box">

            <h2 id="planet-name">

                SOLAR SYSTEM

            </h2>

            <p id="planet-info">

                Click any planet to see details.

            </p>

        </div>

        <!-- SUN -->

        <div class="sun"></div>

        <!-- MERCURY -->

        <div class="orbit orbit1">

            <div class="planet-holder">

                <img src="images/mercury.png"
                     class="planet mercury"
                     onclick="showPlanet(
                     'Mercury',
                     'Mercury is the closest planet to the Sun and the smallest planet in the Solar System. It has a rocky surface filled with craters and experiences extremely hot days and very cold nights because it has almost no atmosphere.'
                     )">

                <div class="planet-name">

                    Mercury

                </div>

            </div>

        </div>

        <!-- VENUS -->

        <div class="orbit orbit2">

            <div class="planet-holder">

                <img src="images/venus.png"
                     class="planet venus"
                     onclick="showPlanet(
                     'Venus',
                     'Venus is the second planet from the Sun and the hottest planet in the Solar System. Its thick atmosphere traps heat, making the surface extremely hot. Venus also rotates very slowly compared to other planets.'
                     )">

                <div class="planet-name">

                    Venus

                </div>

            </div>

        </div>

        <!-- EARTH -->

        <div class="orbit orbit3">

            <div class="planet-holder">

                <img src="images/earth.png"
                     class="planet earth"
                     onclick="showPlanet(
                     'Earth',
                     'Earth is the third planet from the Sun and the only known planet that supports life. It contains liquid water, oxygen-rich air, and diverse ecosystems. Earth has one natural satellite called the Moon.'
                     )">

                <div class="planet-name">

                    Earth

                </div>

            </div>

        </div>

        <!-- MARS -->

        <div class="orbit orbit4">

            <div class="planet-holder">

                <img src="images/mars.png"
                     class="planet mars"
                     onclick="showPlanet(
                     'Mars',
                     'Mars is known as the Red Planet because of the iron-rich dust on its surface. Scientists believe Mars once had water, and research is ongoing to find signs of ancient life. It contains the tallest volcano in the Solar System.'
                     )">

                <div class="planet-name">

                    Mars

                </div>

            </div>

        </div>

        <!-- JUPITER -->

        <div class="orbit orbit5">

            <div class="planet-holder">

                <img src="images/jupiter.png"
                     class="planet jupiter"
                     onclick="showPlanet(
                     'Jupiter',
                     'Jupiter is the largest planet in the Solar System and is made mostly of gas. It has a giant storm called the Great Red Spot and many moons, including Ganymede, the largest moon in the Solar System.'
                     )">

                <div class="planet-name">

                    Jupiter

                </div>

            </div>

        </div>

        <!-- SATURN -->

        <div class="orbit orbit6">

            <div class="planet-holder">

                <img src="images/saturn.png"
                     class="planet saturn"
                     onclick="showPlanet(
                     'Saturn',
                     'Saturn is famous for its beautiful ring system made of ice and rock particles. It is the second-largest planet and is mostly composed of hydrogen and helium gas.'
                     )">

                <div class="planet-name">

                    Saturn

                </div>

            </div>

        </div>

        <!-- URANUS -->

        <div class="orbit orbit7">

            <div class="planet-holder">

                <img src="images/uranus.png"
                     class="planet uranus"
                     onclick="showPlanet(
                     'Uranus',
                     'Uranus is an ice giant with a blue-green color caused by methane gas in its atmosphere. It rotates sideways, making it unique among the planets in the Solar System.'
                     )">

                <div class="planet-name">

                    Uranus

                </div>

            </div>

        </div>

        <!-- NEPTUNE -->

        <div class="orbit orbit8">

            <div class="planet-holder">

                <img src="images/neptune.png"
                     class="planet neptune"
                     onclick="showPlanet(
                     'Neptune',
                     'Neptune is the farthest planet from the Sun and is known for its powerful winds and deep blue appearance. It is an ice giant with a cold atmosphere and several moons, including Triton.'
                     )">

                <div class="planet-name">

                    Neptune

                </div>

            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
